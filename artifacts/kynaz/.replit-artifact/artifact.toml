kind = "web"
previewPath = "/"
title = "Kynaz Enterprise Portal"
version = "1.0.0"
id = "artifacts/kynaz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19900

[services.development]
run = "pnpm --filter @workspace/kynaz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kynaz", "run", "build" ]
publicDir = "artifacts/kynaz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19900"
BASE_PATH = "/"
